<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="5K Trainer">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>5K Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #131a2e;
      --card-alt: #1a2340;
      --accent: #00e676;
      --accent-orange: #ff6d00;
      --accent-blue: #448aff;
      --text: #ffffff;
      --text-dim: #7a8bb5;
      --border: #1e2a4a;
      --danger: #ff1744;
      --success: #00e676;
      --easy: #00e676;
      --medium: #ffab00;
      --hard: #ff1744;
      --rest: #7a8bb5;
      --intervals: #448aff;
      --tempo: #ff6d00;
      --long: #e040fb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }
    .mono { font-family: 'Space Mono', monospace; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-in { animation: fadeInUp 0.4s ease-out forwards; }
    .animate-slide { animation: slideIn 0.3s ease-out forwards; }

    /* --- LOGIN --- */
    #login-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .login-logo {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 40px;
      box-shadow: 0 8px 32px rgba(0,230,118,0.2);
    }
    .login-title { font-size: 32px; font-weight: 900; letter-spacing: -1px; text-align: center; }
    .login-subtitle { color: var(--text-dim); font-size: 14px; text-align: center; margin: 8px 0 0; }
    .login-card {
      background: var(--card); border-radius: 20px; padding: 28px;
      width: 100%; max-width: 340px; border: 1px solid var(--border); margin-top: 48px;
    }
    .form-label {
      color: var(--text-dim); font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 14px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 16px; font-family: 'Outfit', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: #3a4a6a; }
    .form-group { margin-bottom: 20px; }

    .btn-primary {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      letter-spacing: 0.5px; transition: all 0.3s;
      background: linear-gradient(135deg, var(--accent), #00c853);
      color: var(--bg); box-shadow: 0 4px 20px rgba(0,230,118,0.25);
    }
    .btn-primary:disabled { background: var(--border); color: var(--text-dim); box-shadow: none; cursor: default; }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }

    .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-bottom: 16px; }
    .login-footer { color: var(--text-dim); font-size: 12px; margin-top: 32px; opacity: 0.6; text-align: center; }

    /* --- ONBOARDING --- */
    #onboarding-screen { min-height: 100vh; padding: 24px 20px; }
    .progress-bar { display: flex; gap: 6px; margin-bottom: 32px; }
    .progress-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
    .progress-dot.active { background: var(--accent); }
    .onboard-title { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
    .onboard-subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
    .option-btn {
      width: 100%; padding: 18px 20px; background: var(--card);
      border: 2px solid var(--border); border-radius: 16px;
      cursor: pointer; text-align: left; transition: all 0.2s; margin-bottom: 12px;
    }
    .option-btn.selected { background: rgba(0,230,118,0.06); border-color: var(--accent); }
    .option-btn:active { transform: scale(0.98); }
    .option-label { color: var(--text); font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .option-desc { color: var(--text-dim); font-size: 13px; }
    .onboard-nav { display: flex; gap: 12px; margin-top: 32px; }
    .btn-secondary {
      flex: 1; padding: 16px; background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-primary-flex { flex: 2; }

    /* --- MAIN APP --- */
    #main-app { padding-bottom: 80px; }
    .app-header {
      padding: 16px 20px; display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: var(--bg);
    }
    .welcome-label { color: var(--text-dim); font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
    .welcome-name { color: var(--text); font-size: 16px; font-weight: 700; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); padding: 6px 12px; border-radius: 8px;
      font-size: 12px; cursor: pointer; font-family: 'Outfit', sans-serif;
    }

    .tab-content { padding: 20px 20px 0; }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(12px, env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 4px 8px; color: var(--text-dim); transition: color 0.2s;
      font-family: 'Outfit', sans-serif;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 18px; }
    .nav-icon.log-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }
    .nav-btn.active .nav-label { font-weight: 700; }

    /* --- CARDS & SHARED --- */
    .info-card {
      background: var(--card); border-radius: 16px; padding: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .info-card-title {
      font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 16px;
    }

    .date-header { margin-bottom: 24px; }
    .date-text { color: var(--text-dim); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .week-badge { color: var(--accent); font-size: 14px; font-weight: 600; margin-top: 4px; }

    /* --- COACHING CARD --- */
    .coach-card {
      background: linear-gradient(135deg, #0d2818, #132a1e);
      border-radius: 20px; padding: 24px; margin-bottom: 20px;
      border: 1px solid rgba(0,230,118,0.15); position: relative; overflow: hidden;
    }
    .coach-card .coach-glow {
      position: absolute; top: -30px; right: -30px; width: 120px; height: 120px;
      border-radius: 50%; background: rgba(0,230,118,0.08);
    }
    .coach-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(0,230,118,0.15); display: flex; align-items: center;
      justify-content: center; font-size: 20px; margin-bottom: 14px;
    }
    .coach-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; color: var(--accent); }
    .coach-text { color: #b0d4c0; font-size: 14px; line-height: 1.7; }
    .coach-tip {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(0,230,118,0.12);
    }
    .coach-tip-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
    }
    .coach-tip-text { color: #b0d4c0; font-size: 13px; line-height: 1.6; }

    /* --- SESSION LIST (flexible days) --- */
    .session-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; background: var(--bg); border-radius: 14px;
      margin-bottom: 10px; border: 1px solid var(--border); transition: all 0.2s;
    }
    .session-item.completed {
      opacity: 0.5; border-color: var(--success);
      background: rgba(0,230,118,0.04);
    }
    .session-check {
      width: 28px; height: 28px; border-radius: 8px;
      border: 2px solid var(--border); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 14px; color: transparent;
    }
    .session-item.completed .session-check {
      border-color: var(--success); background: rgba(0,230,118,0.15);
      color: var(--success);
    }
    .session-type-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .session-info { flex: 1; }
    .session-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .session-desc { color: var(--text-dim); font-size: 12px; line-height: 1.4; }
    .session-dist {
      font-size: 16px; font-weight: 800; color: var(--accent);
      flex-shrink: 0; text-align: right;
    }
    .session-dist-unit { font-size: 11px; color: var(--text-dim); font-weight: 400; }

    /* --- TODAY SESSION CARD --- */
    .session-card {
      background: linear-gradient(135deg, var(--card), var(--card-alt));
      border-radius: 20px; padding: 24px; margin-bottom: 20px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .session-card .glow {
      position: absolute; top: -20px; right: -20px;
      width: 100px; height: 100px; border-radius: 50%; opacity: 0.15;
    }
    .session-type-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .session-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .session-desc-lg { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
    .session-stats { display: flex; gap: 16px; }
    .stat-box {
      background: var(--bg); border-radius: 12px; padding: 12px 16px;
      flex: 1; text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 800; }
    .stat-label { color: var(--text-dim); font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-top: 2px; }

    .btn-log-run {
      width: 100%; padding: 18px; border: none; border-radius: 16px;
      font-size: 17px; font-weight: 800; cursor: pointer; margin-bottom: 20px;
      letter-spacing: 0.5px; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--accent), #00c853);
      color: var(--bg); box-shadow: 0 4px 24px rgba(0,230,118,0.25);
    }
    .btn-log-run:active { transform: scale(0.98); }

    .progress-track { background: var(--bg); border-radius: 8px; height: 8px; overflow: hidden; margin-top: 16px; }
    .progress-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--accent), var(--accent-blue)); transition: width 0.5s; }
    .progress-labels { display: flex; justify-content: space-between; margin-top: 8px; }
    .progress-label-text { color: var(--text-dim); font-size: 12px; }

    .run-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .run-date { font-size: 14px; font-weight: 600; }
    .run-details { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .run-pace { font-size: 18px; font-weight: 800; color: var(--accent); }
    .run-pace-unit { font-size: 11px; color: var(--text-dim); font-weight: 400; }

    /* --- PLAN SCREEN --- */
    .week-accordion { margin-bottom: 12px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    .week-header {
      width: 100%; padding: 16px 20px; background: var(--card);
      border: none; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center;
      font-family: 'Outfit', sans-serif;
    }
    .week-header:active { background: var(--card-alt); }
    .week-header-left { display: flex; align-items: center; gap: 12px; }
    .week-number {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(0,230,118,0.12); display: flex;
      align-items: center; justify-content: center;
      color: var(--accent); font-weight: 800; font-size: 14px;
    }
    .week-title { color: var(--text); font-size: 15px; font-weight: 700; text-align: left; }
    .week-subtitle { color: var(--text-dim); font-size: 12px; text-align: left; }
    .week-arrow { color: var(--text-dim); font-size: 18px; }
    .week-body { background: var(--card); padding: 8px 16px 16px; }
    .week-adjusted {
      font-size: 11px; font-weight: 600; color: var(--accent-blue);
      padding: 4px 10px; border-radius: 8px; background: rgba(68,138,255,0.1);
      display: inline-block; margin-left: 8px;
    }

    /* --- LOG RUN --- */
    .form-input.mono-input {
      font-family: 'Space Mono', monospace; font-size: 18px;
      font-weight: 600; text-align: center;
    }
    .time-row { display: flex; gap: 12px; align-items: center; }
    .time-row .form-input { flex: 1; }
    .time-sep { color: var(--text-dim); font-size: 16px; font-weight: 600; }
    .effort-row { display: flex; gap: 8px; }
    .effort-btn {
      flex: 1; padding: 12px 8px; border-radius: 12px; cursor: pointer;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--text-dim); font-size: 14px; font-weight: 700;
      transition: all 0.2s; font-family: 'Outfit', sans-serif;
    }
    .effort-btn.selected-easy { border-color: var(--easy); background: rgba(0,230,118,0.06); color: var(--easy); }
    .effort-btn.selected-medium { border-color: var(--medium); background: rgba(255,171,0,0.06); color: var(--medium); }
    .effort-btn.selected-hard { border-color: var(--hard); background: rgba(255,23,68,0.06); color: var(--hard); }
    .effort-btn:active { transform: scale(0.96); }

    .pace-preview { background: var(--bg); border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 20px; }
    .pace-label { color: var(--text-dim); font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
    .pace-value { color: var(--accent); font-size: 36px; font-weight: 900; }
    .pace-unit { color: var(--text-dim); font-size: 13px; }

    /* --- PROGRESS --- */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card); border-radius: 16px; padding: 20px;
      border: 1px solid var(--border); text-align: center;
    }
    .stat-card-label { color: var(--text-dim); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-card-value { font-size: 28px; font-weight: 900; }
    .stat-card-unit { color: var(--text-dim); font-size: 12px; }
    .chart-note { color: var(--text-dim); font-size: 12px; margin-top: 12px; text-align: center; }
    .effort-tag {
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; display: inline-block;
    }

    /* --- COMPARE --- */
    .compare-headers { display: flex; justify-content: space-between; margin-bottom: 16px; padding: 0 8px; }
    .compare-user { display: flex; align-items: center; gap: 8px; }
    .compare-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--bg);
    }
    .compare-avatar.me { background: linear-gradient(135deg, var(--accent), var(--accent-blue)); }
    .compare-avatar.them { background: linear-gradient(135deg, var(--accent-orange), var(--danger)); }
    .compare-name-me { color: var(--accent); font-size: 14px; font-weight: 700; }
    .compare-name-them { color: var(--accent-orange); font-size: 14px; font-weight: 700; }
    .compare-card {
      background: var(--card); border-radius: 16px; padding: 20px;
      border: 1px solid var(--border); margin-bottom: 12px;
    }
    .compare-label {
      color: var(--text-dim); font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; text-align: center; margin-bottom: 12px;
    }
    .compare-values { display: flex; justify-content: space-between; align-items: center; }
    .compare-val { text-align: center; flex: 1; }
    .compare-num { font-size: 26px; font-weight: 900; }
    .compare-vs { color: var(--text-dim); font-size: 16px; font-weight: 300; padding: 0 12px; }
    .leading-badge { font-size: 11px; font-weight: 700; margin-top: 4px; }
    .activity-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .activity-left { display: flex; align-items: center; gap: 10px; }
    .activity-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--bg);
    }
    .activity-name { font-size: 13px; font-weight: 600; }
    .activity-detail { color: var(--text-dim); font-size: 11px; margin-top: 1px; }

    /* --- LOADING --- */
    .loading-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-dim); font-size: 14px; }

    /* --- SESSION TYPE SELECTOR IN LOG --- */
    .type-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .type-btn {
      padding: 8px 14px; border-radius: 10px; cursor: pointer;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--text-dim); font-size: 13px; font-weight: 700;
      transition: all 0.2s; font-family: 'Outfit', sans-serif;
    }
    .type-btn.selected { border-color: var(--accent); background: rgba(0,230,118,0.06); color: var(--accent); }
    .type-btn:active { transform: scale(0.96); }

    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="animate-in">
    <div class="login-logo">🏃</div>
    <h1 class="login-title">5K TRAINER</h1>
    <p class="login-subtitle">Your personal running companion</p>
  </div>
  <div class="login-card animate-in" style="animation-delay: 0.15s;">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="login-username" class="form-input" placeholder="Enter your username" autocapitalize="none" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label class="form-label">Password</label>
      <input id="login-password" type="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <button id="login-btn" class="btn-primary" onclick="handleLogin()">LET'S GO →</button>
  </div>
  <p class="login-footer">Private app — invitation only</p>
</div>

<!-- ONBOARDING SCREEN -->
<div id="onboarding-screen" class="hidden">
  <div class="progress-bar" id="onboard-progress"></div>
  <h1 class="onboard-title" id="onboard-title"></h1>
  <p class="onboard-subtitle" id="onboard-subtitle"></p>
  <div id="onboard-options"></div>
  <div class="onboard-nav" id="onboard-nav"></div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
  <div class="app-header">
    <div class="header-left">
      <div class="user-avatar" id="header-avatar"></div>
      <div>
        <div class="welcome-label">Welcome back</div>
        <div class="welcome-name" id="header-name"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Log out</button>
  </div>
  <div id="tab-content"></div>
  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="today" onclick="switchTab('today')">
      <span class="nav-icon">🏠</span><span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" data-tab="plan" onclick="switchTab('plan')">
      <span class="nav-icon">📋</span><span class="nav-label">Plan</span>
    </button>
    <button class="nav-btn" data-tab="log" onclick="switchTab('log')">

  // =============================================================
  // SMART PLAN GENERATOR — adapts based on actual runs
  // =============================================================
  function generateSmartPlan(profile, runs) {
    const { level, goalTime, weeks, daysPerWeek } = profile;
    const goalPace = goalTime / 5;
    const plan = [];
    const sortedRuns = [...runs].sort((a, b) => a.date.localeCompare(b.date));

    // Analyze past performance
    const avgPace = sortedRuns.length > 0
      ? sortedRuns.reduce((s, r) => s + r.pace, 0) / sortedRuns.length : goalPace + 2;
    const recentRuns = sortedRuns.slice(-10);
    const recentAvgPace = recentRuns.length > 0
      ? recentRuns.reduce((s, r) => s + r.pace, 0) / recentRuns.length : avgPace;
    const recentAvgDist = recentRuns.length > 0
      ? recentRuns.reduce((s, r) => s + r.distance, 0) / recentRuns.length : level === 'beginner' ? 2 : 3;
    const recentAvgEffort = recentRuns.length > 0
      ? recentRuns.reduce((s, r) => s + (r.effort === 'hard' ? 3 : r.effort === 'medium' ? 2 : 1), 0) / recentRuns.length : 2;

    // Calculate how many weeks of data we have
    const planStartDate = sortedRuns.length > 0 ? new Date(sortedRuns[0].date) : new Date();
    const now = new Date();
    const weeksElapsed = Math.max(1, Math.floor((now - planStartDate) / (7 * 86400000)) + 1);

    // Weekly run counts to gauge adherence
    const weeklyRunCounts = [];
    for (let w = 0; w < weeksElapsed; w++) {
      const weekStart = new Date(planStartDate);
      weekStart.setDate(weekStart.getDate() + w * 7);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 7);
      const count = sortedRuns.filter(r => {
        const d = new Date(r.date);
        return d >= weekStart && d < weekEnd;
      }).length;
      weeklyRunCounts.push(count);
    }
    const avgCompletionRate = weeklyRunCounts.length > 0
      ? weeklyRunCounts.reduce((s, c) => s + c, 0) / weeklyRunCounts.length / daysPerWeek : 0;

    // Adjustment factors
    let intensityFactor = 1;
    let volumeFactor = 1;

    // If mostly rating runs as "hard", dial it back
    if (recentAvgEffort > 2.5) { intensityFactor = 0.85; volumeFactor = 0.9; }
    // If mostly "easy", push a bit harder
    else if (recentAvgEffort < 1.5 && recentRuns.length >= 3) { intensityFactor = 1.1; volumeFactor = 1.05; }

    // If completion rate is low, reduce volume
    if (avgCompletionRate > 0 && avgCompletionRate < 0.5) { volumeFactor *= 0.85; }
    // If completing everything, slight bump
    else if (avgCompletionRate > 0.85 && weeksElapsed > 1) { volumeFactor *= 1.05; }

    for (let w = 1; w <= weeks; w++) {
      const progress = w / weeks;
      // Taper in final week
      const taperFactor = w === weeks ? 0.7 : w === weeks - 1 ? 0.85 : 1;

      const easyPace = +(recentAvgPace > 0 ? recentAvgPace * 1.05 : goalPace + 2 - progress * 0.8).toFixed(1);
      const tempoPace = +(goalPace + 0.5 - progress * 0.3).toFixed(1);

      const sessions = [];

      // Build session types for this week
      let sessionTypes;
      if (level === 'beginner') {
        if (daysPerWeek <= 3) sessionTypes = ['easy', 'intervals', 'long'];
        else if (daysPerWeek === 4) sessionTypes = ['easy', 'intervals', 'easy', 'long'];
        else sessionTypes = ['easy', 'intervals', 'easy', 'long', 'easy'];
      } else {
        if (daysPerWeek <= 3) sessionTypes = ['intervals', 'tempo', 'long'];
        else if (daysPerWeek === 4) sessionTypes = ['easy', 'intervals', 'tempo', 'long'];
        else sessionTypes = ['easy', 'intervals', 'tempo', 'easy', 'long'];
      }

      sessionTypes = sessionTypes.slice(0, daysPerWeek);

      // Progressive overload with smart adjustment
      for (const type of sessionTypes) {
        let distance, pace, description, name;

        if (type === 'easy') {
          const baseDist = level === 'beginner' ? 2 + progress * 1.5 : 3 + progress * 2;
          distance = +(baseDist * volumeFactor * taperFactor).toFixed(1);
          pace = easyPace;
          name = '🏃 Easy Run';
          description = `${distance} km at a comfortable, conversational pace (~${pace} min/km)`;
        } else if (type === 'intervals') {
          const baseDist = level === 'beginner' ? 2 + progress * 1 : 3 + progress * 1.5;
          distance = +(baseDist * volumeFactor * taperFactor).toFixed(1);
          pace = tempoPace;
          const reps = Math.max(3, Math.round(distance * 2));
          name = '⚡ Intervals';
          description = `${reps} × 400m fast (~${pace} min/km pace), with 200m recovery jog between each`;
        } else if (type === 'tempo') {
          const baseDist = 3 + progress * 2;
          distance = +(baseDist * volumeFactor * intensityFactor * taperFactor).toFixed(1);
          pace = tempoPace;
          name = '🔥 Tempo Run';
          description = `${distance} km at a challenging but sustainable pace (~${pace} min/km)`;
        } else if (type === 'long') {
          const baseDist = level === 'beginner' ? 3 + progress * 2.5 : 4 + progress * 3;
          distance = +(baseDist * volumeFactor * taperFactor).toFixed(1);
          pace = +(easyPace + 0.5).toFixed(1);
          name = '🏔️ Long Run';
          description = `${distance} km at an easy, steady pace (~${pace} min/km). Focus on time on feet, not speed.`;
        }

        sessions.push({ type, name, description, distance, pace });
      }

      const totalDist = sessions.reduce((s, ses) => s + ses.distance, 0);
      const isAdjusted = w > weeksElapsed && (volumeFactor !== 1 || intensityFactor !== 1);

      plan.push({ week: w, sessions, totalDist: +totalDist.toFixed(1), isAdjusted });
    }

    return plan;
  }

  // =============================================================
  // SMART COACHING — generates personalised advice
  // =============================================================
  function generateCoaching(runs, profile, plan) {
    if (!profile) return null;
    const sorted = [...runs].sort((a, b) => a.date.localeCompare(b.date));

    if (sorted.length === 0) {
      return {
        title: "Let's get started! 🚀",
        message: `Welcome to your ${profile.weeks}-week training journey! Your goal is to run 5K in under ${profile.goalTime} minutes. Log your first run and I'll start giving you personalised advice.`,
        tip: `Start with an easy run at a comfortable pace where you can hold a conversation. Don't worry about speed — consistency is everything in the early days.`,
        mood: 'welcome'
      };
    }

    const totalDist = sorted.reduce((s, r) => s + r.distance, 0);
    const totalRuns = sorted.length;
    const avgPace = (sorted.reduce((s, r) => s + r.pace, 0) / totalRuns).toFixed(1);
    const bestPace = Math.min(...sorted.map(r => r.pace)).toFixed(1);
    const goalPace = (profile.goalTime / 5).toFixed(1);

    // Recent vs older comparison
    const recent5 = sorted.slice(-5);
    const older5 = sorted.slice(0, Math.min(5, Math.max(1, sorted.length - 5)));
    const recentAvgPace = recent5.reduce((s, r) => s + r.pace, 0) / recent5.length;
    const olderAvgPace = older5.reduce((s, r) => s + r.pace, 0) / older5.length;
    const paceChange = olderAvgPace - recentAvgPace;
    const paceChangePercent = Math.abs(paceChange / olderAvgPace * 100).toFixed(0);

    // Effort analysis
    const recentEfforts = recent5.map(r => r.effort || 'medium');
    const hardCount = recentEfforts.filter(e => e === 'hard').length;
    const easyCount = recentEfforts.filter(e => e === 'easy').length;

    // Consistency — days since last run
    const lastRunDate = new Date(sorted[sorted.length - 1].date);
    const daysSinceLastRun = Math.floor((new Date() - lastRunDate) / 86400000);

    // Weekly volume
    const now = new Date();
    const thisWeekRuns = sorted.filter(r => {
      const d = new Date(r.date);
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      return d >= weekAgo;
    });
    const thisWeekDist = thisWeekRuns.reduce((s, r) => s + r.distance, 0);

    // Distance trend
    const recentAvgDist = recent5.reduce((s, r) => s + r.distance, 0) / recent5.length;
    const olderAvgDist = older5.reduce((s, r) => s + r.distance, 0) / older5.length;

    // Build coaching message
    let messages = [];
    let tips = [];
    let title = '';
    let mood = 'neutral';

    // === Pace analysis ===
    if (sorted.length >= 3 && paceChange > 0.2) {
      title = "You're getting faster! 🔥";
      messages.push(`Your pace has improved by about ${paceChangePercent}% over your recent runs — great progress. Your recent average is ${recentAvgPace.toFixed(1)} min/km compared to ${olderAvgPace.toFixed(1)} min/km earlier.`);
      mood = 'great';
    } else if (sorted.length >= 3 && paceChange < -0.2) {
      title = "Pace has dipped a bit 📊";
      messages.push(`Your recent pace has slowed slightly — ${recentAvgPace.toFixed(1)} min/km vs ${olderAvgPace.toFixed(1)} min/km earlier. This could be from tiredness, longer distances, or just a tough week. Don't worry — this is completely normal in training.`);
      mood = 'support';
    } else if (sorted.length >= 3) {
      title = "Steady and consistent 💪";
      messages.push(`You're holding a steady pace around ${recentAvgPace.toFixed(1)} min/km. Consistency is key and you're nailing it.`);
      mood = 'good';
    } else {
      title = "Building your base 🏗️";
      messages.push(`You've logged ${totalRuns} run${totalRuns > 1 ? 's' : ''} so far, covering ${totalDist.toFixed(1)} km total. Keep building that base — the data will get more useful as you log more runs.`);
      mood = 'neutral';
    }

    // === Goal progress ===
    const paceGap = recentAvgPace - goalPace;
    if (paceGap <= 0) {
      messages.push(`Amazing — your current pace is already faster than your ${profile.goalTime}-minute goal! You're on track to smash it.`);
      mood = 'great';
    } else if (paceGap < 0.5) {
      messages.push(`You're very close to your goal pace of ${goalPace} min/km — just ${paceGap.toFixed(1)} min/km to shave off. Keep pushing on those tempo and interval sessions.`);
    } else if (paceGap < 1.5) {
      messages.push(`Your target pace is ${goalPace} min/km and you're currently at ${recentAvgPace.toFixed(1)} min/km. That's a reachable gap — interval training will be your best friend here.`);
    }

    // === Consistency check ===
    if (daysSinceLastRun >= 5) {
      messages.push(`It's been ${daysSinceLastRun} days since your last run. Life gets in the way sometimes! Try to get back out there — even a short easy run will keep your momentum going.`);
      mood = 'nudge';
    } else if (daysSinceLastRun === 0) {
      messages.push(`You ran today — nice one! Make sure you rest and recover well before your next session.`);
    }

    // === Effort analysis ===
    if (hardCount >= 3) {
      tips.push(`You've rated ${hardCount} of your last ${recent5.length} runs as "hard". Consider dialling it back on your next easy run — recovery is where your body actually gets stronger. Running easy should feel genuinely easy.`);
    } else if (easyCount >= 4) {
      tips.push(`Most of your recent runs felt easy — that's great for building endurance! When you feel ready, try pushing the pace on one session this week to challenge yourself.`);
    }

    // === Distance tips ===
    if (recentAvgDist > olderAvgDist * 1.3 && sorted.length >= 6) {
      tips.push(`Your average distance per run has jumped quite a bit recently. A good rule of thumb is to increase weekly distance by no more than 10% to avoid injury. Listen to your body!`);
    }

    // === Type-specific tips ===
    const runTypes = sorted.map(r => r.sessionType || 'easy');
    const hasIntervals = runTypes.some(t => t === 'intervals');
    const hasLong = runTypes.some(t => t === 'long');

    if (sorted.length >= 5 && !hasLong) {
      tips.push(`You haven't logged a long run yet. Long runs build endurance and are key to comfortably finishing a 5K. Try one this week at a slow, easy pace.`);
    }
    if (sorted.length >= 5 && !hasIntervals) {
      tips.push(`Adding interval sessions is the fastest way to improve your pace. Try alternating between 400m fast efforts and 200m recovery jogs.`);
    }

    // === Milestones ===
    if (totalDist >= 50 && totalDist < 51) {
      messages.push(`🎉 Milestone! You've just passed 50 km total distance. That's something to be proud of!`);
    } else if (totalDist >= 100 && totalDist < 101) {
      messages.push(`🎉 Incredible! You've hit 100 km total distance!`);
    }
    if (totalRuns === 10) {
      messages.push(`🎉 10 runs logged! You're building a real habit now.`);
    }

    // Default tip if none generated
    if (tips.length === 0) {
      if (profile.level === 'beginner') {
        tips.push(`Focus on running at a pace where you could hold a conversation. Speed will come naturally as your body adapts. Consistency beats intensity every time.`);
      } else {
        tips.push(`Mix up your sessions — easy runs for recovery, intervals for speed, and long runs for endurance. The variety is what makes you a stronger runner.`);
      }
    }

    return {
      title,
      message: messages.join(' '),
      tip: tips[0],
      mood
    };
  }

  // === HELPERS ===
  function getCurrentWeekNumber(plan) {
    if (!plan || plan.length === 0) return 1;
    const now = new Date();
    const profileCreated = STATE.profile?.createdAt?.toDate?.() || new Date();
    const weeksSinceStart = Math.floor((now - profileCreated) / (7 * 86400000)) + 1;
    return Math.max(1, Math.min(weeksSinceStart, plan.length));
  }

  function getThisWeekRuns() {
    const now = new Date();
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
    monday.setHours(0, 0, 0, 0);
    return STATE.runs.filter(r => new Date(r.date) >= monday);
  }

  function matchRunToSession(run, sessions) {
    // Try to match a run to the most appropriate session type
    if (run.sessionType) {
      const idx = sessions.findIndex(s => s.type === run.sessionType && !s._matched);
      if (idx >= 0) { sessions[idx]._matched = true; return idx; }
    }
    // Fallback: match by distance proximity
    let bestIdx = -1, bestDiff = Infinity;
    sessions.forEach((s, i) => {
      if (s._matched) return;
      const diff = Math.abs(s.distance - run.distance);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    });
    if (bestIdx >= 0) sessions[bestIdx]._matched = true;
    return bestIdx;
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  // === RENDER ===
  function renderMainApp() {
    document.getElementById('header-avatar').textContent = STATE.user.username[0].toUpperCase();
    document.getElementById('header-name').textContent = STATE.user.username;
    renderTabContent();
  }

  function renderTabContent() {
    const el = document.getElementById('tab-content');
    switch (STATE.currentTab) {
      case 'today': el.innerHTML = renderTodayScreen(); break;
      case 'plan': el.innerHTML = renderPlanScreen(); break;
      case 'log': el.innerHTML = renderLogScreen(); break;
      case 'progress': el.innerHTML = renderProgressScreen(); break;
      case 'compare': el.innerHTML = renderCompareScreen(); break;
    }
    attachTabListeners();
  }

  // === TODAY SCREEN ===
  function renderTodayScreen() {
    if (!STATE.plan) return '<div class="tab-content"><p style="color:var(--text-dim)">No plan set up yet.</p></div>';
    const today = new Date();
    const currentWeek = getCurrentWeekNumber(STATE.plan);
    const weekData = STATE.plan[Math.min(currentWeek - 1, STATE.plan.length - 1)];
    const weekRuns = getThisWeekRuns();

    // Mark completed sessions
    const sessionsWithStatus = weekData.sessions.map(s => ({ ...s, _matched: false }));
    weekRuns.forEach(r => matchRunToSession(r, sessionsWithStatus));

    const completedCount = sessionsWithStatus.filter(s => s._matched).length;
    const totalSessions = sessionsWithStatus.length;
    const totalDistTarget = weekData.totalDist;
    const totalDistDone = weekRuns.reduce((s, r) => s + r.distance, 0);

    // Find next uncompleted session to highlight
    const nextSession = sessionsWithStatus.find(s => !s._matched);

    // Coaching
    const coaching = generateCoaching(STATE.runs, STATE.profile, STATE.plan);

    const typeColors = { easy: 'var(--easy)', intervals: 'var(--intervals)', tempo: 'var(--tempo)', long: 'var(--long)' };

    // Session list
    let sessionsHtml = sessionsWithStatus.map((ses, i) => {
      const color = typeColors[ses.type] || 'var(--accent)';
      const isNext = ses === nextSession;
      return `<div class="session-item ${ses._matched ? 'completed' : ''}" style="${isNext ? 'border-color:' + color + ';' : ''}">
        <div class="session-check">${ses._matched ? '✓' : ''}</div>
        <div class="session-type-dot" style="background:${color}"></div>
        <div class="session-info">
          <div class="session-name" style="${ses._matched ? 'text-decoration:line-through;opacity:0.6' : ''}">${ses.name}${isNext ? ' <span style="font-size:11px;color:' + color + '">(NEXT UP)</span>' : ''}</div>
          <div class="session-desc">${ses.description}</div>
        </div>
        <div class="session-dist">
          <span class="mono">${ses.distance}</span>
          <span class="session-dist-unit">km</span>
        </div>
      </div>`;
    }).join('');

    // Next session highlight card
    let nextCardHtml = '';
    if (nextSession) {
      const color = typeColors[nextSession.type] || 'var(--accent)';
      nextCardHtml = `
        <div class="session-card">
          <div class="glow" style="background:${color}"></div>
          <div class="session-type-badge" style="background:${color}22;color:${color}">NEXT UP: ${nextSession.type.toUpperCase()}</div>
          <h2 class="session-title">${nextSession.name}</h2>
          <p class="session-desc-lg">${nextSession.description}</p>
          <div class="session-stats">
            <div class="stat-box">
              <div class="stat-value mono" style="color:var(--accent)">${nextSession.distance}</div>
              <div class="stat-label">KM</div>
            </div>
            ${nextSession.pace ? `<div class="stat-box">
              <div class="stat-value mono" style="color:var(--accent-orange)">${nextSession.pace}</div>
              <div class="stat-label">MIN/KM</div>
            </div>` : ''}
          </div>
        </div>
        <button class="btn-log-run" id="btn-goto-log">✏️ LOG A RUN</button>`;
    } else {

  function updatePacePreview() {
    const dist = parseFloat(document.getElementById('log-distance')?.value);
    const mins = parseInt(document.getElementById('log-minutes')?.value) || 0;
    const secs = parseInt(document.getElementById('log-seconds')?.value) || 0;
    const total = mins + secs / 60;
    const preview = document.getElementById('pace-preview');
    const btn = document.getElementById('save-run-btn');
    if (dist > 0 && total > 0) {
      const pace = total / dist;
      document.getElementById('pace-value').textContent = pace.toFixed(1);
      preview.classList.remove('hidden');
      btn.disabled = false;

      // Auto-detect session type based on distance and pace
      const goalPace = STATE.profile ? STATE.profile.goalTime / 5 : 6;
      const avgDist = STATE.runs.length > 0
        ? STATE.runs.reduce((s, r) => s + r.distance, 0) / STATE.runs.length : 3;

      let detectedType = 'easy';

      // Long run: distance is 30%+ above average or above 4.5km, with relaxed pace
      if (dist >= Math.max(avgDist * 1.3, 4.5) && pace >= goalPace + 0.5) {
        detectedType = 'long';
      }
      // Intervals: shorter distance with fast pace (near or under goal pace)
      else if (dist <= Math.max(avgDist * 0.9, 3.5) && pace <= goalPace + 0.3) {
        detectedType = 'intervals';
      }
      // Tempo: moderate distance with pace close to goal
      else if (pace <= goalPace + 0.8 && pace > goalPace - 0.5) {
        detectedType = 'tempo';
      }
      // Easy: comfortable pace, moderate distance
      else {
        detectedType = 'easy';
      }

      // Update the type buttons
      STATE._selectedType = detectedType;
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.type === detectedType);
      });

      // Show auto-detected badge
      const badge = document.getElementById('auto-detect-badge');
      if (badge) badge.classList.remove('hidden');

    } else {
      preview.classList.add('hidden');
      btn.disabled = true;
      const badge = document.getElementById('auto-detect-badge');
      if (badge) badge.classList.add('hidden');
    }
  }

  async function saveRun() {
    const date = document.getElementById('log-date').value;
    const distance = parseFloat(document.getElementById('log-distance').value);
    const mins = parseInt(document.getElementById('log-minutes').value) || 0;
    const secs = parseInt(document.getElementById('log-seconds').value) || 0;
    const timeMinutes = +(mins + secs / 60).toFixed(1);
    const pace = +(timeMinutes / distance).toFixed(1);
    const effort = STATE._selectedEffort || 'medium';
    const sessionType = STATE._selectedType || 'easy';

    const btn = document.getElementById('save-run-btn');
    btn.textContent = 'Saving...'; btn.disabled = true;

    try {
      const runsRef = collection(db, 'users', STATE.user.uid, 'runs');
      await addDoc(runsRef, { date, distance, timeMinutes, pace, effort, sessionType, createdAt: Timestamp.now() });
      STATE.runs.unshift({ date, distance, timeMinutes, pace, effort, sessionType, id: Date.now().toString() });
      // Regenerate plan with new data
      STATE.plan = generateSmartPlan(STATE.profile, STATE.runs);
      switchTab('today');
    } catch (e) {
      console.error('Error saving run:', e);
      btn.textContent = 'Error — try again'; btn.disabled = false;
    }
  }

    const items = [
      { label: 'Total Distance', mine: `${myStats.totalDist.toFixed(1)} km`, theirs: `${theirStats.totalDist.toFixed(1)} km`, myVal: myStats.totalDist, theirVal: theirStats.totalDist, higher: true },

    let cardsHtml = items.map(item => {
      const iWin = item.higher ? item.myVal > item.theirVal : item.myVal < item.theirVal;

    { title: 'Days per week you can run?', subtitle: 'Rest days are built in automatically', key: 'daysPerWeek',
      options: [
        { value: 3, label: '3 days', desc: 'Great for beginners' },
        { value: 4, label: '4 days', desc: 'Good balance' },
        { value: 5, label: '5 days', desc: 'Serious training' },
      ] },
  ];

  function renderOnboarding() {
    const step = ONBOARD_STEPS[STATE.onboardStep];
    document.getElementById('onboard-progress').innerHTML = ONBOARD_STEPS.map((_, i) =>
      `<div class="progress-dot ${i <= STATE.onboardStep ? 'active' : ''}"></div>`).join('');
    document.getElementById('onboard-title').textContent = step.title;
    document.getElementById('onboard-subtitle').textContent = step.subtitle;
    const selected = STATE.onboardData[step.key];
    document.getElementById('onboard-options').innerHTML = step.options.map(opt => `
      <button class="option-btn ${selected === opt.value ? 'selected' : ''}" onclick="window._selectOption('${step.key}', ${typeof opt.value === 'string' ? `'${opt.value}'` : opt.value})">
        <div class="option-label">${opt.label}</div>
        <div class="option-desc">${opt.desc}</div>
      </button>
    `).join('');
    let navHtml = '';
    if (STATE.onboardStep > 0) navHtml += `<button class="btn-secondary" onclick="window._onboardBack()">← Back</button>`;
    navHtml += `<button class="btn-primary btn-primary-flex" ${!selected ? 'disabled' : ''} onclick="window._onboardNext()">
      ${STATE.onboardStep < ONBOARD_STEPS.length - 1 ? 'Next →' : 'BUILD MY PLAN →'}
    </button>`;
    document.getElementById('onboard-nav').innerHTML = navHtml;
  }

  window._selectOption = (key, value) => { STATE.onboardData[key] = value; renderOnboarding(); };
  window._onboardBack = () => { STATE.onboardStep = Math.max(0, STATE.onboardStep - 1); renderOnboarding(); };
  window._onboardNext = async () => {
    if (STATE.onboardStep < ONBOARD_STEPS.length - 1) { STATE.onboardStep++; renderOnboarding(); }
    else {
      const profile = { ...STATE.onboardData, createdAt: Timestamp.now() };
      try {
        await setDoc(doc(db, 'profiles', STATE.user.uid), profile);
        STATE.profile = profile;
        STATE.plan = generateSmartPlan(profile, STATE.runs);
        showScreen('main'); renderMainApp();
      } catch (e) { alert('Error saving your profile. Please try again.'); }
    }
  };
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW reg failed:', err));
  }
</script>

</body>
</html>
